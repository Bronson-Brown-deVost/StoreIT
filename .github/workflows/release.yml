name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: "true"

jobs:
  build-linux:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64-gnu
            target: x86_64-unknown-linux-gnu
            asset: storeit-server-linux-x86_64
            use_cross: false

          - name: linux-x86_64-musl
            target: x86_64-unknown-linux-musl
            asset: storeit-server-linux-x86_64-musl
            use_cross: false

          - name: linux-aarch64-gnu
            target: aarch64-unknown-linux-gnu
            asset: storeit-server-linux-aarch64
            use_cross: true

          - name: linux-aarch64-musl
            target: aarch64-unknown-linux-musl
            asset: storeit-server-linux-aarch64-musl
            use_cross: true

    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: cd frontend && npm ci && npm run build

      # Native x86_64 builds
      - name: Install musl tools
        if: "!matrix.use_cross && contains(matrix.target, 'musl')"
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Build (native)
        if: "!matrix.use_cross"
        run: cargo build --release --target ${{ matrix.target }} -p storeit-server

      # Cross-compiled aarch64 builds
      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (cross)
        if: matrix.use_cross
        run: cross build --release --target ${{ matrix.target }} -p storeit-server

      - name: Package binary
        run: |
          cp target/${{ matrix.target }}/release/storeit-server ${{ matrix.asset }}
          chmod +x ${{ matrix.asset }}

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  build-macos:
    name: Build ${{ matrix.name }}
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-aarch64
            target: aarch64-apple-darwin
            asset: storeit-server-darwin-aarch64

          - name: macos-x86_64
            target: x86_64-apple-darwin
            asset: storeit-server-darwin-x86_64

    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: cd frontend && npm ci && npm run build

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} -p storeit-server

      - name: Package binary
        run: |
          cp target/${{ matrix.target }}/release/storeit-server ${{ matrix.asset }}
          chmod +x ${{ matrix.asset }}

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

  build-windows:
    name: Build windows-x86_64
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - uses: Swatinem/rust-cache@v2
        with:
          key: x86_64-pc-windows-msvc

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: cd frontend && npm ci && npm run build

      - name: Build release binary
        run: cargo build --release --target x86_64-pc-windows-msvc -p storeit-server

      - name: Package binary
        run: cp target/x86_64-pc-windows-msvc/release/storeit-server.exe storeit-server-windows-x86_64.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v5
        with:
          name: storeit-server-windows-x86_64.exe
          path: storeit-server-windows-x86_64.exe

  release:
    name: Create Release
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Download all artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release
          for dir in artifacts/*/; do
            cp "$dir"* release/ 2>/dev/null || true
          done
          # Copy storeit-ctl
          cp tools/storeit-ctl release/storeit-ctl
          chmod +x release/storeit-ctl
          # Generate checksums
          cd release && sha256sum * > SHA256SUMS

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: StoreIT v${{ steps.version.outputs.version }}
          draft: false
          generate_release_notes: true
          files: release/*

  docker:
    name: Docker Image
    needs: [build-linux, release]
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io
    steps:
      - uses: actions/checkout@v5

      - name: Lowercase image name
        id: image
        run: echo "name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"

      - name: Download musl binaries from build artifacts
        uses: actions/download-artifact@v5
        with:
          path: artifacts

      - name: Prepare binaries
        run: |
          mkdir -p binaries/linux-amd64 binaries/linux-arm64
          cp artifacts/storeit-server-linux-x86_64-musl/storeit-server-linux-x86_64-musl binaries/linux-amd64/storeit-server
          cp artifacts/storeit-server-linux-aarch64-musl/storeit-server-linux-aarch64-musl binaries/linux-arm64/storeit-server
          chmod +x binaries/linux-amd64/storeit-server binaries/linux-arm64/storeit-server

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (amd64)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64
          push: true
          build-args: BINARY=binaries/linux-amd64/storeit-server
          tags: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:${{ steps.version.outputs.version }}-amd64

      - name: Build and push (arm64)
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/arm64
          push: true
          build-args: BINARY=binaries/linux-arm64/storeit-server
          tags: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:${{ steps.version.outputs.version }}-arm64

      - name: Create multi-arch manifest
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ steps.image.outputs.name }}"
          VERSION="${{ steps.version.outputs.version }}"
          docker buildx imagetools create \
            --tag "${IMAGE}:${VERSION}" \
            --tag "${IMAGE}:latest" \
            "${IMAGE}:${VERSION}-amd64" \
            "${IMAGE}:${VERSION}-arm64"
